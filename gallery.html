<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Галерея - Музыкальная группа</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <h1><i class="fas fa-guitar"></i> НАЗВАНИЕ ГРУППЫ</h1>
                <p>Альтернативный рок | Барнаул</p>
            </div>
            <nav>
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="about.html">О группе</a></li>
                    <li><a href="music.html">Музыка</a></li>
                    <li><a href="gallery.html" class="active">Галерея</a></li>
                    <li><a href="concerts.html">Концерты</a></li>
                    <li><a href="contacts.html">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1>Галерея</h1>
                <p>Фото с концертов, репетиций и из жизни группы</p>
            </div>
        </section>

        <section class="gallery-filters">
            <div class="container">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-category="all">Все фото</button>
                    <button class="filter-btn" data-category="concert">Концерты</button>
                    <button class="filter-btn" data-category="rehearsal">Репетиции</button>
                    <button class="filter-btn" data-category="studio">Студия</button>
                    <button class="filter-btn" data-category="behind">За кулисами</button>
                </div>
            </div>
        </section>

        <section class="gallery-grid-section">
            <div class="container">
                <div class="gallery-grid" id="galleryGrid">
                    <!-- Фото загружаются через JavaScript -->
                </div>
            </div>
        </section>

        <!-- Модальное окно -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="modal-close">&times;</span>
                <img id="modalImage" src="" alt="">
                <div class="modal-info">
                    <h3 id="modalTitle"></h3>
                    <p id="modalDescription"></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-social">
                <a href="#"><i class="fab fa-vk"></i></a>
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <div class="footer-links">
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="about.html">О группе</a></li>
                    <li><a href="music.html">Музыка</a></li>
                    <li><a href="gallery.html">Галерея</a></li>
                    <li><a href="concerts.html">Концерты</a></li>
                    <li><a href="contacts.html">Контакты</a></li>
                </ul>
            </div>
            <div class="footer-copyright">
                <p>&copy; 2025 Группа «Название группы»</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
